<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: أسطورة الجواهر</title>
    <style>
        :root { --gold: #ffd700; --bg: #050a14; --panel: #112240; --accent: #00f2ff; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow: hidden; }
        
        /* واجهة علوية احترافية */
        .header { background: linear-gradient(180deg, var(--panel), #000); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .stat-box { text-align: center; border: 1px solid rgba(255,215,0,0.3); padding: 5px 15px; border-radius: 10px; background: rgba(255,255,255,0.05); }

        /* لوحة اللعب */
        #game-board { 
            display: grid; grid-template-columns: repeat(8, 40px); grid-gap: 4px; 
            justify-content: center; margin: 30px auto; padding: 12px; 
            background: rgba(17, 34, 64, 0.8); border: 2px solid var(--accent); 
            border-radius: 15px; box-shadow: 0 0 20px var(--accent);
        }
        .gem { 
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; transition: transform 0.2s, background 0.3s;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .selected { transform: scale(1.2); box-shadow: 0 0 15px white; z-index: 5; border: 2px solid #fff; }
