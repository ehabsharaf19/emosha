<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: جواهر المعرفة - إيهاب شرف</title>
    <style>
        /* التنسيق الأساسي لضمان عدم ظهور شاشة سوداء */
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login { position: absolute; inset: 0; background: radial-gradient(circle, #002200, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        
        /* إطار اللوجو الآمن لظهور كلمة EMOSHA كاملة */
        .logo-frame { width: 170px; height: 170px; border-radius: 50%; border: 4px solid #ffcc00; margin-bottom: 20px; background: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 25px #ffcc00; }
        .logo-frame img { width: 85%; height: 85%; object-fit: contain; }

        .btn-play { background: #ffcc00; color: #000; padding: 15px 40px; border: none; border-radius: 30px; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 10px rgba(255,204,0,0.4); }
        
        /* واجهة اللعبة - الجواهر */
        #game { display: none; width: 100%; height: 100%; flex-direction: column; }
        .bar { background: #111; padding: 15px; display: flex; justify-content: space-around; border-bottom: 2px solid #ffcc00; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; padding: 15px; margin: auto; background: #222; border-radius: 12px; max-width: 380px; }
        .gem { aspect-ratio: 1/1; background: #333; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <div class="logo-frame">
        <img src="https://i.ibb.co/SXxQbqVh/Screenshot-Chat-GPT.jpg" alt="EMOSHA">
    </div>
    <h2 style="color:#ffcc00">إيموشا: جواهر المعرفة</h2>
    <p>بإشراف القبطان إيهاب شرف</p>
    <button class="btn-play" onclick="start()">دخول تجربة الجواهر 💎</button>
</div>

<div id="game">
    <div class="bar">
        <div style="color:#ffcc00">💰 ذهب: <span id="g">0</span></div>
        <div style="color:#ff4444">⏳ وقت: <span id="t">60</span></div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<script>
    function start() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('game').style.display = 'flex';
        const icons = ['💎', '⭐', '💣', '🛡️', '🔱', '🧿'];
        const grid = document.getElementById('grid');
        for(let i=0; i<36; i++) {
            let d = document.createElement('div');
            d.className = 'gem';
            d.innerHTML = icons[Math.floor(Math.random()*icons.length)];
            d.onclick = function() { 
                this.style.background = '#444'; 
                document.getElementById('g').innerText = parseInt(document.getElementById('g').innerText) + 10;
            };
            grid.appendChild(d);
        }
    }
</script>
</body>
</html>
