<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - نسخة القبطان الاحترافية</title>

    <style>
        :root {
            --gold: #ffd700;
            --dark-green: #051605;
        }

        body {
            background-color: var(--dark-green);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* واجهة المستخدم العلوي */
        .header {
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
        }

        .stat-box {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* منطقة اللعب */
        #game-container {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(6, 55px);
            grid-gap: 8px;
            padding: 15px;
            background: #111;
            border-radius: 15px;
            box-shadow: 0 0 20px var(--gold);
        }

            width: 55px;
            height: 55px;
            background: #2a2a2a;
