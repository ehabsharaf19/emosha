<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: جواهر المعرفة</title>
    <style>
        body {
            background: #0a192f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }
        .header {
            background: linear-gradient(to right, #004e92, #000428);
            padding: 15px;
            border-bottom: 3px solid #ffd700;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-gap: 5px;
            justify-content: center;
            margin: 20px auto;
            background: #112240;
            padding: 10px;
            border-radius: 10px;
            width: fit-content;
            box-shadow: 0 0 15px #00f2ff;
        }
        .gem {
            width: 40px;
            height: 40px;
            background: #1d2d50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .quiz-section {
            background: #112240;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #ffd700;
        }
        .btn {
            background: #ffd700;
            color: black;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>إيموشا: جواهر المعرفة 💎</h1>
    <p>الذهب 💰: <span id="score">0</span> | المرحلة ⭐: <span id="lvl">1</span></p>
</div>

<div id="game-board"></div>

<div class="quiz-section">
    <h3 id="q-text">سؤال العبور: ما هي عاصمة مصر؟</h3>
    <div id="options"></div>
</div>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    const gems = ['💎', '🧿', '⭐', '👑', '🔱', '🧿'];
    let score = 0;
    let currentLvl = 1;

    // بنك أسئلة بسيط
    const myQuestions = [
        { q: "ما هي عاصمة مصر؟", a: ["القاهرة", "طنطا", "دبي"], c: "القاهرة" },
        { q: "ما هو أسرع حيوان؟", a: ["الأسد", "الفهد", "الفيل"], c: "الفهد" },
        { q: "أين تقع الأهرامات؟", a: ["الجيزة", "أسوان", "القليوبية"], c: "الجيزة" }
    ];

    function init() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const div = document.createElement('div');
            div.className = 'gem';
            div.innerHTML = gems[Math.floor(Math.random() * gems.length)];
            div.onclick = () => {
                score += 10;
                document.getElementById('score').innerText = score;
                div.style.background = '#444';
                setTimeout(() => div.style.background = '#1d2d50', 100);
                div.innerHTML = gems[Math.floor(Math.random() * gems.length)];
                // تشغيل الموسيقى عند أول ضغطة لو المتصفح مانعها
                document.getElementById('bg-music').play().catch(()=>{});
            };
            board.appendChild(div);
        }
        loadQuestion();
    }

    function loadQuestion() {
        const qData = myQuestions[(currentLvl - 1) % myQuestions.length];
        document.getElementById('q-text').innerText = qData.q;
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = '';
        qData.a.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = opt;
            b.onclick = () => {
                if(opt === qData.c) {
                    alert("صح يا قبطان! للمرحلة التالية..");
                    currentLvl++;
                    document.getElementById('lvl').innerText = currentLvl;
                    init();
                } else {
                    alert("ركز شوية يا هندسة!");
                }
            };
            optContainer.appendChild(b);
        });
    }

    window.onload = init;
</script>

</body>
</html>
