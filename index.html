<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: جواهر المعرفة</title>
    <style>
        :root { --main-blue: #004e92; --dark-blue: #000428; --gold: #ffd700; }
        body { background: var(--dark-blue); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* الواجهة الزرقاء الأصلية */
        .header-blue { background: linear-gradient(180deg, #0072ff, #00c6ff); padding: 25px; border-bottom: 4px solid var(--gold); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .stats { font-size: 1.2rem; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; gap: 20px; }

        /* منطقة اللعب */
        #game-grid { display: grid; grid-template-columns: repeat(8, 42px); grid-gap: 6px; justify-content: center; margin: 30px auto; padding: 15px; background: rgba(255,255,255,0.05); border: 2px solid #00f2ff; border-radius: 15px; width: fit-content; box-shadow: 0 0 15px #00f2ff; }
        .gem { width: 42px; height: 42px; background: #1a2a4a; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .selected { transform: scale(1.2); border: 2px solid white; box-shadow: 0 0 10px white; }

        /* منطقة السؤال */
        .quiz-container { background: rgba(17, 34, 64, 0.9); margin: 20px auto; padding: 20px; width: 90%; max-width: 400px; border: 2px solid var(--gold); border-radius: 20px; display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .ans-btn { background: var(--gold); color: black; border: none; padding: 12px 25px; margin: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; min-width: 100px; }
    </style>
</head>
<body>

<div class="header-blue">
    <h1 style="margin:0;">💎 إيموشا: جواهر المعرفة</h1>
    <div class="stats">
        <span>الذهب 💰: <span id="scr">0</span></span>
        <span>المرحلة ⭐: <span id="lvl">1</span></span>
    </div>
</div>

<div id="game-grid"></div>

<div id="quiz-screen" class="quiz-container">
    <h2 style="color:var(--gold)">بوابة الانتقال</h2>
    <p id="q-text" style="font-size:1.3rem;"></p>
    <div id="options"></div>
</div>

<audio id="winMusic">
    <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
</audio>

        { q: "ما هو أسرع حيوان؟", a: ["الأسد", "الفهد", "الغزال"], c: 1 }
    ];

    function createBoard() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const div = document.createElement('div');
            div.className = 'gem';
            div.innerHTML = gems[Math.floor(Math.random() * gems.length)];
            div.onclick = () => clickGem(div);
            grid.appendChild(div);
        }
    }

            firstGem = gem;
            gem.classList.add('selected');

            firstGem.innerHTML = gem.innerHTML;
            gem.innerHTML = temp;
            
            firstGem.classList.remove('selected');
