<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة فواكه القبطان إيهاب</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .score-board {
            font-size: 24px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .grid div {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .grid div:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="score-board">النقاط: <span id="score">0</span></div>
    <div class="grid" id="grid"></div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script>
        const grid = document.getElementById('grid');
        const scoreDisplay = document.getElementById('score');
        const width = 8;
        const squares = [];
        let score = 0;
        let audioStarted = false;

        const candyColors = ['🍎', '🍊', '🍇', '🍓', '🍋', '🥝'];

        function createBoard() {
            for (let i = 0; i < width * width; i++) {
                const square = document.createElement('div');
                square.setAttribute('draggable', true);
                square.setAttribute('id', i);
                let randomColor = Math.floor(Math.random() * candyColors.length);
                square.innerHTML = candyColors[randomColor];
                grid.appendChild(square);
                squares.push(square);
            }
        }
        createBoard();

        let colorBeingDragged, colorBeingReplaced, squareIdBeingDragged, squareIdBeingReplaced;

        squares.forEach(square => square.addEventListener('dragstart', dragStart));
        squares.forEach(square => square.addEventListener('dragend', dragEnd));
        squares.forEach(square => square.addEventListener('dragover', dragOver));
        squares.forEach(square => square.addEventListener('dragenter', dragEnter));
        squares.forEach(square => square.addEventListener('dragleave', dragLeave));
        squares.forEach(square => square.addEventListener('drop', dragDrop));

        function dragStart() {
            colorBeingDragged = this.innerHTML;
            squareIdBeingDragged = parseInt(this.id);
            if(!audioStarted) {
                document.getElementById('bgMusic').play();
                audioStarted = true;
            }
        }
        function dragOver(e) { e.preventDefault(); }
        function dragEnter(e) { e.preventDefault(); }
        function dragLeave() {}

        function dragDrop() {
            colorBeingReplaced = this.innerHTML;
            squareIdBeingReplaced = parseInt(this.id);
        }

        function dragEnd() {
            let validMoves = [
                squareIdBeingDragged - 1,
                squareIdBeingDragged - width,
                squareIdBeingDragged + 1,
                squareIdBeingDragged + width
            ];
            let isValidMove = validMoves.includes(squareIdBeingReplaced);

            if (squareIdBeingReplaced && isValidMove) {
                squares[squareIdBeingReplaced].innerHTML = colorBeingDragged;
                squares[squareIdBeingDragged].innerHTML = colorBeingReplaced;

                // التحقق هل الحركة أنتجت 3 قطع أو أكثر؟
                if (checkMatches()) {
                    squareIdBeingReplaced = null;
                } else {
                    // لو مفيش 3 قطع، رجعهم مكانهم (لا يفرقع 2 فقط)
                    squares[squareIdBeingReplaced].innerHTML = colorBeingReplaced;
                    squares[squareIdBeingDragged].innerHTML = colorBeingDragged;
                }
            }
        }

        function checkMatches() {
            let hasMatch = false;
            // التحقق من الصفوف (3 أو أكثر)
            for (let i = 0; i < 64; i++) {
                let rowOfThree = [i, i + 1, i + 2];
                let decidedColor = squares[i].innerHTML;
                let isBlank = squares[i].innerHTML === '';
                const notValid = [6, 7, 14, 15, 22, 23, 30, 31, 38, 39, 46, 47, 54, 55, 62, 63];
                if (notValid.includes(i)) continue;

                if (rowOfThree.every(index => squares[index].innerHTML === decidedColor && !isBlank)) {
                    score += 3;
                    scoreDisplay.innerHTML = score;
                    rowOfThree.forEach(index => squares[index].innerHTML = '');
                    hasMatch = true;
                }
            }
            // التحقق من الأعمدة (3 أو أكثر)
            for (let i = 0; i < 47; i++) {
                let columnOfThree = [i, i + width, i + width * 2];
                let decidedColor = squares[i].innerHTML;
                let isBlank = squares[i].innerHTML === '';

                if (columnOfThree.every(index => squares[index].innerHTML === decidedColor && !isBlank)) {
                    score += 3;
                    scoreDisplay.innerHTML = score;
                    columnOfThree.forEach(index => squares[index].innerHTML = '');
                    hasMatch = true;
                }
            }
            if(hasMatch) setTimeout(fillEmpty, 300);
            return hasMatch;
        }

        function fillEmpty() {
            for (let i = 0; i < 64; i++) {
                if (squares[i].innerHTML === '') {
                    let randomColor = Math.floor(Math.random() * candyColors.length);
                    squares[i].innerHTML = candyColors[randomColor];
                }
            }
            checkMatches();
        }

        window.setInterval(function(){
            checkMatches();
        }, 500);

    </script>
</body>
</html>
