<script>

const board=document.getElementById("board");

const gems=[
"💎",
"⭐",
"🟣",
"🟢",
"🔥",
"🔷"
];

let grid=[];

let score=0;
let gold=0;
let level=1;

let selected=null;

const size=8;

const questions=[

{
q:"ما عاصمة مصر؟",
a:["القاهرة","روما","باريس"],
c:"القاهرة"
},

{
q:"كم عدد الكواكب؟",
a:["8","9","7"],
c:"8"
},

{
q:"أكبر محيط؟",
a:["الهادئ","الهندي","الأطلسي"],
c:"الهادئ"
}

];

function updateUI(){

document.getElementById("score").innerText=score;

document.getElementById("gold").innerText=gold;

document.getElementById("level").innerText=level;

}

function randomGem(){

return gems[Math.floor(Math.random()*gems.length)];

}

function createBoard(){

board.innerHTML='';

grid=[];

for(let row=0;row<size;row++){

let current=[];

for(let col=0;col<size;col++){

const gem=document.createElement("div");

gem.classList.add("gem");

gem.innerText=randomGem();

gem.dataset.row=row;
gem.dataset.col=col;

gem.addEventListener("click",()=>selectGem(gem));

board.appendChild(gem);

current.push(gem);

}

grid.push(current);

}

}

function selectGem(gem){

if(!selected){

selected=gem;

gem.classList.add("selected");

}else{

swapGems(selected,gem);

selected.classList.remove("selected");

selected=null;

}

}

function swapGems(a,b){

const temp=a.innerText;

a.innerText=b.innerText;

b.innerText=temp;

checkMatches();

}

function checkMatches(){

let matched=[];

for(let row=0;row<size;row++){

for(let col=0;col<size-2;col++){

let g1=grid[row][col];
let g2=grid[row][col+1];
let g3=grid[row][col+2];

if(

g1.innerText &&
g1.innerText===g2.innerText &&
g2.innerText===g3.innerText

){

matched.push(g1,g2,g3);

}

}

}

for(let col=0;col<size;col++){

for(let row=0;row<size-2;row++){

let g1=grid[row][col];
let g2=grid[row+1][col];
let g3=grid[row+2][col];

if(

g1.innerText &&
g1.innerText===g2.innerText &&
g2.innerText===g3.innerText

){

matched.push(g1,g2,g3);

}

}

}

if(matched.length>0){

matched.forEach(g=>{

g.classList.add("explode");

setTimeout(()=>{

g.innerText='';

g.classList.remove("explode");

},250);

});

score+=matched.length*10;

gold+=matched.length*3;

updateUI();

document.getElementById("sound").play();

setTimeout(()=>{

dropGems();

},300);

}

}

function dropGems(){

for(let col=0;col<size;col++){

for(let row=size-1;row>=0;row--){

if(grid[row][col].innerText===''){

for(let k=row;k>0;k--){

grid[k][col].innerText=
grid[k-1][col].innerText;

}

grid[0][col].innerText=randomGem();

}

}

}

setTimeout(()=>{

checkMatches();

},200);

if(score>=level*500){

level++;

updateUI();

showQuestion();

}

}

function spinWheel(){

const rewards=[50,100,150,200];

let reward=
rewards[Math.floor(Math.random()*rewards.length)];

gold+=reward;

updateUI();

alert("🎉 ربحت "+reward+" ذهب");

}

function shop(){

if(gold>=100){

gold-=100;

score+=200;

alert("🛒 تم شراء Boost");

}else{

alert("❌ ذهب غير كافي");

}

updateUI();

}

function showQuestion(){

const q=
questions[Math.floor(Math.random()*questions.length)];

const box=document.getElementById("questionBox");

box.style.display="block";

document.getElementById("questionText").innerText=q.q;

const answers=document.getElementById("answers");

answers.innerHTML='';

q.a.forEach(ans=>{

const btn=document.createElement("button");

btn.innerText=ans;

btn.onclick=()=>{

if(ans===q.c){

gold+=100;

score+=100;

alert("✅ إجابة صحيحة");

}else{

alert("❌ إجابة خاطئة");

}

updateUI();

box.style.display="none";

};

answers.appendChild(btn);

});

}

createBoard();

updateUI();

  </script><audio autoplay loop>
