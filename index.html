<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emousha Gems - العودة للأصل</title>
    <style>
        :root { --primary-bg: #0f172a; --card-bg: #1e293b; --gold: #fbc02d; }
        body { background-color: var(--primary-bg); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        
        .header { background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .stats-container { display: flex; justify-content: space-around; background: var(--card-bg); margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }

        #grid { 
            display: grid; grid-template-columns: repeat(8, 40px); grid-gap: 8px; 
            justify-content: center; margin: 20px auto; background: var(--card-bg); 
            padding: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .gem { width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.2s; }
        .gem:active { transform: scale(0.8); }

        .quiz-box { background: var(--card-bg); margin: 20px; padding: 20px; border-radius: 15px; border-top: 5px solid var(--gold); }
        .option-btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">Emousha Gems 💎</h1>
    <p style="margin:5px 0 0;">إيموشا | جواهر المعرفة</p>
</div>

<div class="stats-container">
    <div>🏆 النقاط: <span id="score">0</span></div>
    <div>⭐ المستوى: <span id="level">1</span></div>
</div>

<div id="grid"></div>

<div class="quiz-box">
    <h3>📚 سؤال المعرفة</h3>
    <p id="question">ما هي عاصمة مصر؟</p>
    <div id="options">
        <button class="btn option-btn" onclick="checkAns(true)">القاهرة</button>
        <button class="btn option-btn" onclick="checkAns(false)">الإسكندرية</button>
        <button class="btn option-btn" onclick="checkAns(false)">الأقصر</button>
    </div>
</div>

<script>
    const gemsList = ['💎', '🍎', '🍇', '⭐', '🧿', '🍀'];
    let score = 0;
    let level = 1;

    function createBoard() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 64; i++) {
            const gem = document.createElement('div');
            gem.className = 'gem';
            // نختار لون عشوائي من الجواهر الشيك اللي كانت في صورتك
            gem.innerHTML = gemsList[Math.floor(Math.random() * gemsList.length)];
            gem.onclick = () => {
                score += 10;
                document.getElementById('score').innerText = score;
                gem.style.transform = 'scale(1.2)';
                setTimeout(() => {
                    gem.style.transform = 'scale(1)';
                    gem.innerHTML = gemsList[Math.floor(Math.random() * gemsList.length)];
                }, 100);
            };
            grid.appendChild(gem);
        }
    }

    function checkAns(isCorrect) {
        if(isCorrect) {
            alert("إجابة صحيحة يا قبطان! +50 ذهبة");
            score += 50;
            level++;
            document.getElementById('score').innerText = score;
            document.getElementById('level').innerText = level;
            createBoard();
        } else {
            alert("حاول مرة أخرى!");
        }
    }

    window.onload = createBoard;
</script>

</body>
</html>
