<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMOUSHA GEMS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
<div>⭐ <span id="score">0</span></div>
<div>💰 <span id="gold">0</span></div>
<div>🎯 <span id="level">1</span></div>
</div>

<div id="board" class="board"></div>

<div class="buttons">
<button id="spinBtn">🎡 عجلة الحظ</button>
<button id="shopBtn">🛒 المتجر</button>
</div>

<div id="questionBox" class="popup">
<h2>🧠 سؤال المرحلة</h2>
<p id="questionText"></p>
<div id="answers"></div>
</div>

<audio id="bgMusic" loop src="sounds/bg.mp3"></audio>
<audio id="boom" src="sounds/boom.mp3"></audio>
<audio id="combo" src="sounds/combo.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
