<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: جواهر المعرفة</title>
    <style>
        body { background: #000428; color: white; font-family: sans-serif; margin: 0; text-align: center; overflow: hidden; touch-action: none; }
        .header { background: linear-gradient(180deg, #0072ff, #00c6ff); padding: 20px; border-bottom: 3px solid #ffd700; }
        .stats { display: flex; justify-content: center; gap: 20px; font-weight: bold; margin: 10px 0; }
        #grid { display: grid; grid-template-columns: repeat(8, 42px); grid-gap: 5px; justify-content: center; margin: 20px auto; background: rgba(0,242,255,0.1); padding: 10px; border-radius: 12px; border: 2px solid #00f2ff; width: fit-content; }
        .cell { width: 42px; height: 42px; background: #1a2a4a; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 6px; cursor: pointer; user-select: none; }
        .active { outline: 3px solid white; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">💎 إيموشا: جواهر المعرفة</h1>
    <div class="stats">
        <span>الذهب 💰: <span id="s">0</span></span>
        <span>المرحلة ⭐: <span id="l">1</span></span>
    </div>
</div>

<div id="grid"></div>

<audio id="m" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

<script>
    const types = ['🍎', '🍇', '🍊', '🍓', '🍋', '💎'];
    let score = 0, first = null, cells = [];

    function start() {
        const g = document.getElementById('grid');
        g.innerHTML = ''; cells = [];
        for (let i = 0; i < 64; i++) {
            const d = document.createElement('div');
            d.className = 'cell';
            d.innerHTML = types[Math.floor(Math.random() * types.length)];
            d.onclick = () => {
                document.getElementById('m').play().catch(()=>{});
                handle(d, i);
            };
            g.appendChild(d);
            cells.push(d);
        }
    }

    function handle(d, i) {
        if (!first) {
            first = {d, i}; d.classList.add('active');
        } else {
            let diff = Math.abs(first.i - i);
            // حركة واحدة فقط (يمين، شمال، فوق، تحت)
            if (diff === 1 || diff === 8) {
                let t = first.d.innerHTML;
                first.d.innerHTML = d.innerHTML;
                d.innerHTML = t;
                if (!check()) { // لو مفيش 3 مفرقعين، يرجع مكانه
                    setTimeout(() => { let x = first.d.innerHTML; first.d.innerHTML = d.innerHTML; d.innerHTML = x; }, 300);
                }
            }
            first.d.classList.remove('active'); first = null;
        }
    }

    function check() {
        let found = false;
        // فحص أفقي ورأسي لـ 3 قطع أو أكثر
        for (let i = 0; i < 64; i++) {
            if (i % 8 < 6 && cells[i].innerHTML === cells[i+1].innerHTML && cells[i].innerHTML === cells[i+2].innerHTML) {
                cells[i].innerHTML = cells[i+1].innerHTML = cells[i+2].innerHTML = ''; found = true;
            }
            if (i < 48 && cells[i].innerHTML === cells[i+8].innerHTML && cells[i].innerHTML === cells[i+16].innerHTML) {
                cells[i].innerHTML = cells[i+8].innerHTML = cells[i+16].innerHTML = ''; found = true;
            }
        }
        if (found) {
            score += 10; document.getElementById('s').innerText = score;
            setTimeout(fill, 300);
        }
        return found;
    }

    function fill() {
        cells.forEach(c => { if (c.innerHTML === '') c.innerHTML = types[Math.floor(Math.random() * types.length)]; });
        check();
    }

    window.onload = start;
</script>
</body>
</html>
