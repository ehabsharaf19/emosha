<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - معركة الأسلحة</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; padding: 15px; }
        .score-board { display: flex; justify-content: center; gap: 20px; background: #333; padding: 15px; border-radius: 10px; border: 2px solid #555; }
        .red-score { color: #ff4d4d; font-weight: bold; }
        .blue-score { color: #4d94ff; font-weight: bold; }
        .map { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 350px; margin: 20px auto; }
        .zone { aspect-ratio: 1/1; background: #444; border: 2px solid #666; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 10px; font-size: 20px; transition: 0.3s; }
        .red-team { background: #ff4d4d !important; box-shadow: 0 0 10px #ff4d4d; }
        .blue-team { background: #4d94ff !important; box-shadow: 0 0 10px #4d94ff; }
        .weapon-box { margin: 20px 0; padding: 10px; background: #252525; border-radius: 10px; }
        .weapon-btn { padding: 10px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .bomb { background: #ffcc00; color: #000; }
        .rocket { background: #ff5500; color: #fff; }
    </style>
</head>
<body>
    <h2>إيموشا: صراع الأسلحة ⚔️</h2>
    <div class="score-board">
        <div class="red-score">الصقور: <span id="r-score">0</span></div>
        <div class="blue-score">الذئاب: <span id="b-score">0</span></div>
    </div>

    <div class="weapon-box">
        <p>اختر سلاحك:</p>
        <button class="weapon-btn bomb" onclick="useWeapon('bomb')">💣 قنبلة (تطهير)</button>
        <button class="weapon-btn rocket" onclick="useWeapon('rocket')">🚀 صاروخ (احتلال)</button>
    </div>

    <div class="map">
        <script>
            for(let i=1; i<=9; i++) {
                document.write(`<div class="zone" id="z${i}" onclick="action(${i})">${i}</div>`);
            }
        </script>
    </div>

    <p id="status">اختر فريقاً أولاً بالضغط على النقاط بالأعلى!</p>
    <button onclick="currentTeam='red'" style="background:red; color:white; padding:10px">فريق الصقور</button>
    <button onclick="currentTeam='blue'" style="background:blue; color:white; padding:10px">فريق الذئاب</button>

    <script>
        let currentTeam = '';
        let activeWeapon = '';

        function useWeapon(weapon) {
            activeWeapon = weapon;
            alert("تم تفعيل " + (weapon === 'bomb' ? "القنبلة" : "الصاروخ"));
        }

        function action(id) {
            if(!currentTeam) return alert("اختر فريقك أولاً!");
            let el = document.getElementById('z'+id);
            
            if(activeWeapon === 'bomb') {
                el.className = 'zone';
                activeWeapon = '';
            } else if(activeWeapon === 'rocket') {
                el.className = 'zone ' + (currentTeam === 'red' ? 'red-team' : 'blue-team');
                activeWeapon = '';
            } else {
                el.className = 'zone ' + (currentTeam === 'red' ? 'red-team' : 'blue-team');
            }
            updateScores();
        }

        function updateScores() {
            document.getElementById('r-score').innerText = document.querySelectorAll('.red-team').length;
            document.getElementById('b-score').innerText = document.querySelectorAll('.blue-team').length;
        }
    </script>
</body>
</html>
