<script type="module" src="bati5a.js"></script>

<script type="module">
  import { firebaseConfig } from './bati5a.js';
  
  // دالة لإرسال النقاط للمخزن مع حماية بسيطة
  window.saveScoreToFirebase = function(points) {
    const url = firebaseConfig.databaseURL + "/scores.json";
    
    fetch(url, {
      method: "POST",
      body: JSON.stringify({
        playerName: "لاعب إيموشا",
        score: points,
        date: new Date().toISOString()
      })
    })
    .then(response => console.log("تم حفظ النقاط في المخزن بنجاح!"))
    .catch(error => console.error("خطأ في الحماية أو الربط:", error));
  };

  console.log("إيموشا مأمنة ومتصلة بالمخزن.");
</script>
