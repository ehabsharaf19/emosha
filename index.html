<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: تحدي القبطان</title>
    <style>
        :root { --gold: #ffd700; --dark-blue: #0a192f; }
        body { background: var(--dark-blue); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        
        /* واجهة الإحصائيات */
        .stats-bar { background: rgba(0,0,0,0.7); padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; sticky: top; }
        
        /* منطقة اللعب */
        #game-grid { display: grid; grid-template-columns: repeat(8, 40px); grid-gap: 5px; justify-content: center; margin: 20px auto; padding: 10px; background: #112240; border-radius: 10px; }
        .gem { width: 40px; height: 40px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        
        /* نافذة السؤال (بوابة العبور) */
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .quiz-card { background: #112240; padding: 30px; border-radius: 20px; border: 3px solid var(--gold); width: 80%; max-width: 400px; }
        .option-btn { background: var(--gold); color: black; border: none; padding: 12px; margin: 10px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="stats-bar">
    <div>المرحلة ⭐: <span id="lvl">1</span></div>
    <div>النقاط 🏆: <span id="scr">0</span></div>
    <div>الهدف 🎯: <span id="target">100</span></div>

<div id="quiz-overlay">

        <p id="question-text">جاري تحميل السؤال...</p>
        <div id="options-container"></div>
    </div>
</div>
