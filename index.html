<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMOUSHA GEMS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(to bottom,#020617,#000);
font-family:tahoma;
overflow:hidden;
color:white;
}

.topbar{

width:100%;
padding:15px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
border-bottom:2px solid gold;
font-size:20px;
box-shadow:0 0 20px rgba(255,215,0,.3);

}

.logo{

font-size:30px;
font-weight:bold;
color:gold;
text-shadow:0 0 15px gold;

}

.board{

width:90vw;
max-width:520px;
height:520px;

margin:20px auto;

display:grid;

grid-template-columns:repeat(8,1fr);

gap:5px;

background:#111;

padding:10px;

border-radius:25px;

box-shadow:0 0 40px rgba(255,215,0,.3);

position:relative;

}

.gem{

width:100%;
aspect-ratio:1;

background:#1f2937;

display:flex;

justify-content:center;
align-items:center;

font-size:35px;

border-radius:15px;

cursor:pointer;

transition:.2s;

user-select:none;

}

.gem:hover{

transform:scale(1.08);

}

.selected{

outline:3px solid gold;
transform:scale(1.1);

}

.explode{

animation:explode .3s linear;

}

@keyframes explode{

0%{
transform:scale(1);
opacity:1;
}

100%{
transform:scale(0);
opacity:0;
}

}

.points{

position:absolute;

color:gold;

font-size:22px;

font-weight:bold;

animation:float 1s linear forwards;

pointer-events:none;

z-index:999;

}

@keyframes float{

0%{
opacity:1;
transform:translateY(0);
}

100%{
opacity:0;
transform:translateY(-50px);
}

}

.shake{

animation:shake .2s;

}

@keyframes shake{

0%{transform:translateX(0);}
25%{transform:translateX(5px);}
50%{transform:translateX(-5px);}
75%{transform:translateX(5px);}
100%{transform:translateX(0);}

}

.buttons{

display:flex;

justify-content:center;

gap:20px;

margin-top:20px;

}

button{

padding:15px 25px;

border:none;

border-radius:15px;

background:gold;

font-size:20px;

font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:scale(1.05);

}

.popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

background:#111;

padding:25px;

border-radius:20px;

border:2px solid gold;

display:none;

z-index:1000;

width:90%;
max-width:350px;

text-align:center;

}

.popup h2{

color:gold;

margin-bottom:15px;

}

.popup button{

width:100%;
margin-top:10px;

}

@media(max-width:600px){

.board{

height:380px;

}

.gem{

font-size:24px;

}

.logo{

font-size:22px;

}

.topbar{

font-size:16px;

}

button{

font-size:16px;

padding:12px 15px;

}

}

</style>
</head>

<body>

<div class="topbar">

<div>❤️ 5</div>

<div>⭐ <span id="score">0</span></div>

<div>💰 <span id="gold">0</span></div>

<div class="logo">EMOUSHA 💎</div>

</div>

<div class="board" id="board"></div>

<div class="buttons">

<button onclick="spinWheel()">🎡 عجلة الحظ</button>

<button onclick="shop()">🛒 المتجر</button>

</div>

<div class="popup" id="questionBox">

<h2>🧠 سؤال المرحلة</h2>

<p id="questionText"></p>

<div id="answers"></div>

</div>

<audio id="bgMusic" loop>

<source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_946f9d2f33.mp3">

</audio>

<audio id="matchSound">

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">

</audio>

<script>

const board=document.getElementById("board");

const gems=[

"💎",
"⭐",
"🔥",
"🟣",
"🟢",
"🔷"

];

const size=8;

let grid=[];

let score=0;

let gold=0;

let level=1;

let selected=null;

const questions=[

{
q:"ما عاصمة مصر؟",
a:["القاهرة","روما","باريس"],
c:"القاهرة"
},

{
q:"كم عدد الكواكب؟",
a:["8","9","7"],
c:"8"
},

{
q:"أكبر محيط؟",
a:["الهادئ","الهندي","الأطلسي"],
c:"الهادئ"
}

];

function updateUI(){

document.getElementById("score").innerText=score;

document.getElementById("gold").innerText=gold;

}

function randomGem(){

return gems[Math.floor(Math.random()*gems.length)];

}

function createBoard(){

board.innerHTML='';

grid=[];

for(let row=0;row<size;row++){

let current=[];

for(let col=0;col<size;col++){

const gem=document.createElement("div");

gem.classList.add("gem");

gem.innerText=randomGem();

gem.dataset.row=row;

gem.dataset.col=col;

gem.addEventListener("click",()=>selectGem(gem));

board.appendChild(gem);

current.push(gem);

}

grid.push(current);

}

}

function selectGem(gem){

if(!selected){

selected=gem;

gem.classList.add("selected");

}else{

swapGems(selected,gem);

selected.classList.remove("selected");

selected=null;

}

}

function swapGems(a,b){

const temp=a.innerText;

a.innerText=b.innerText;

b.innerText=temp;

checkMatches();

}

function checkMatches(){

let matched=[];

for(let row=0;row<size;row++){

for(let col=0;col<size-2;col++){

let g1=grid[row][col];
let g2=grid[row][col+1];
let g3=grid[row][col+2];

if(

g1.innerText &&
g1.innerText===g2.innerText &&
g2.innerText===g3.innerText

){

matched.push(g1,g2,g3);

}

}

}

for(let col=0;col<size;col++){

for(let row=0;row<size-2;row++){

let g1=grid[row][col];
let g2=grid[row+1][col];
let g3=grid[row+2][col];

if(

g1.innerText &&
g1.innerText===g2.innerText &&
g2.innerText===g3.innerText

){

matched.push(g1,g2,g3);

}

}

}

if(matched.length>0){

board.classList.add("shake");

setTimeout(()=>{

board.classList.remove("shake");

},200);

matched.forEach(g=>{

explodeGem(g);

});

score+=matched.length*10;

gold+=matched.length*3;

updateUI();

document.getElementById("matchSound").play();

setTimeout(()=>{

dropGems();

},300);

}

}

function explodeGem(gem){

gem.classList.add("explode");

const points=document.createElement("div");

points.className="points";

points.innerText="+10";

points.style.left=gem.offsetLeft+"px";

points.style.top=gem.offsetTop+"px";

board.appendChild(points);

setTimeout(()=>{

points.remove();

},1000);

setTimeout(()=>{

gem.innerText='';

gem.classList.remove("explode");

},250);

}

function dropGems(){

for(let col=0;col<size;col++){

for(let row=size-1;row>=0;row--){

if(grid[row][col].innerText===''){

for(let k=row;k>0;k--){

grid[k][col].innerText=
grid[k-1][col].innerText;

}

grid[0][col].innerText=randomGem();

}

}

}

setTimeout(()=>{

checkMatches();

},200);

if(score>=level*500){

showQuestion();

}

}

function showQuestion(){

const q=
questions[Math.floor(Math.random()*questions.length)];

const box=document.getElementById("questionBox");

box.style.display="block";

document.getElementById("questionText").innerText=q.q;

const answers=document.getElementById("answers");

answers.innerHTML='';

q.a.forEach(ans=>{

const btn=document.createElement("button");

btn.innerText=ans;

btn.onclick=()=>{

if(ans===q.c){

gold+=100;

score+=100;

level++;

alert("✅ تم فتح المرحلة الجديدة");

}else{

alert("❌ إجابة خاطئة");

score=0;

gold=0;

}

updateUI();

box.style.display="none";

};

answers.appendChild(btn);

});

}

function spinWheel(){

const rewards=[50,100,150,200];

const reward=
rewards[Math.floor(Math.random()*rewards.length)];

gold+=reward;

updateUI();

alert("🎉 ربحت "+reward+" ذهب");

}

function shop(){

if(gold>=100){

gold-=100;

score+=200;

alert("🛒 تم شراء أداة");

}else{

alert("❌ الذهب غير كافي");

}

updateUI();

}

document.body.addEventListener("click",()=>{

document.getElementById("bgMusic").play();

},{once:true});

createBoard();

updateUI();

</script>

</body>
</html>
