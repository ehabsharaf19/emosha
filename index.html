<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMOSHA - جواهر المعرفة</title>

    <style>
        body {
            margin: 0;
            background: #071207;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        h1 {
            color: gold;
            margin-top: 10px;
        }

        .top-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            background: #111;
            border-bottom: 2px solid gold;
            font-size: 20px;
        }

        #board {
            width: 360px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(6, 60px);
            gap: 5px;
        }

        .cell {
            width: 60px;
            height: 60px;
            background: #222;
            border-radius: 12px;
            font-size: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: .2s;
        }

        .cell:hover {
            transform: scale(1.1);
        }

        .question-box {
            width: 90%;
            max-width: 500px;
            background: #111;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid gold;
            display: none;
        }

        .answer-btn {
            width: 90%;
            margin: 10px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: gold;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }

        .answer-btn:hover {
            background: orange;
        }

        .win-box {
            display: none;
            margin-top: 20px;
            font-size: 28px;
            color: gold;
        }

        .start-screen {
            position: fixed;
            inset: 0;
            background: #071207;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            background: gold;
            font-size: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="start-screen" id="startScreen">
        <h1>EMOSHA 💎</h1>
        <h2>جواهر المعرفة</h2>
        <p>بإشراف القبطان إيهاب شرف</p>
        <button class="start-btn" onclick="startGame()">ابدأ اللعب</button>
    </div>

    <h1>EMOSHA 💎</h1>

    <div class="top-bar">
        <div>💰 الذهب: <span id="score">0</span></div>
        <div>🏆 المرحلة: <span id="level">1</span></div>
    </div>

    <div id="board"></div>

    <div class="question-box" id="questionBox">
        <h2 id="questionText"></h2>
        <div id="answers"></div>
    </div>

    <div class="win-box" id="winBox">
        🎉 لقد أنهيت المرحلة 🎉
    </div>

    <script type="module">

        // =========================
        // FIREBASE
        // =========================

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import { getAnalytics }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBORppTYoq6wbsoM8cED7T_cW5UHVX5XbE",
            authDomain: "emosha-b67a3.firebaseapp.com",
            projectId: "emosha-b67a3",
            storageBucket: "emosha-b67a3.firebasestorage.app",
            messagingSenderId: "136317351287",
            appId: "1:136317351287:web:f9b7186384278ba6c21d72",
            measurementId: "G-G4F8CDJV0L"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        console.log("Firebase Connected ✅");


        // =========================
        // بيانات اللعبة
        // =========================

        const items = [
            "💎",
            "🍭",
            "🍬",
            "🍫",
            "⭐",
            "🧿"
        ];

        let score = 0;
        let level = 1;
        let moves = 0;

        const board = document.getElementById("board");

        // =========================
        // 100 سؤال
        // =========================

        const questions = [];

        for (let i = 1; i <= 100; i++) {

            questions.push({
                q: "ما رقم هذه المرحلة؟",
                options: [
                    i,
                    i + 1,
                    i + 2,
                    i + 3
                ],
                answer: i
            });

        }

        // =========================
        // تشغيل اللعبة
        // =========================

        window.startGame = function () {

            document.getElementById("startScreen").style.display = "none";

            createBoard();
        }

        // =========================
        // إنشاء اللوحة
        // =========================

        function createBoard() {

            board.innerHTML = "";

            for (let i = 0; i < 36; i++) {

                let cell = document.createElement("div");

                cell.className = "cell";

                cell.innerHTML =
                    items[Math.floor(Math.random() * items.length)];

                cell.onclick = () => clickItem(cell);

                board.appendChild(cell);
            }
        }

        // =========================
        // الضغط على عنصر
        // =========================

        function clickItem(cell) {

            moves++;

            cell.style.background = "green";

            score += 5;

            document.getElementById("score").innerText = score;

            setTimeout(() => {
                cell.style.background = "#222";
            }, 200);

            // كل 10 ضغطات = سؤال
            if (moves >= 10) {

                moves = 0;

                showQuestion();
            }
        }

        // =========================
        // عرض السؤال
        // =========================

        function showQuestion() {

            const qData = questions[level - 1];

            document.getElementById("questionBox").style.display = "block";

            document.getElementById("questionText").innerText = qData.q;

            const answersDiv = document.getElementById("answers");

            answersDiv.innerHTML = "";

            qData.options.forEach(opt => {

                const btn = document.createElement("button");

                btn.className = "answer-btn";

                btn.innerText = opt;

                btn.onclick = () => checkAnswer(opt);

                answersDiv.appendChild(btn);

            });
        }

        // =========================
        // فحص الإجابة
        // =========================

        function checkAnswer(answer) {

            const qData = questions[level - 1];

            if (answer == qData.answer) {

                alert("إجابة صحيحة ✅");

                score += 100;

                level++;

                document.getElementById("score").innerText = score;

                document.getElementById("level").innerText = level;

                document.getElementById("questionBox").style.display = "none";

                createBoard();

                if (level > 100) {

                    document.getElementById("winBox").style.display = "block";

                    board.innerHTML = "";
                }

            } else {

                alert("إجابة خاطئة ❌");

            }
        }

    </script>

</body>

</html>
