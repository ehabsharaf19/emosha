<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - نسخة القبطان</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 15px; border-radius: 8px; border: none; width: 80%; max-width: 300px; font-size: 1.1rem; }
        .start-btn { background: #ffcc00; color: #000; padding: 15px 40px; border: none; border-radius: 8px; margin-top: 20px; font-weight: bold; cursor: pointer; }
        .game-ui { display: none; }
        .score-board { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .score { padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; }
        .map { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 380px; margin: 0 auto; }
        .zone { aspect-ratio: 1/1; background: #333; border: 2px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }
        .red { background: #ff4d4d !important; border-color: white; }
        .blue { background: #4d94ff !important; border-color: white; }
        .weapons { margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        .w-btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="login" class="login-screen">
    <h1>🎮 لعبة إيموشا</h1>
    <p>أهلاً بك يا قبطان، ادخل اسمك للمعارك:</p>
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا...">
    <button class="start-btn" onclick="startGame()">دخول اللعبة</button>
</div>

<div id="gameUI" class="game-ui">
    <h3 id="welcomeMsg"></h3>
    <div class="score-board">
        <div class="score" style="background:#ff4d4d">الصقور: <span id="rs">0</span></div>
        <div class="score" style="background:#4d94ff">الذئاب: <span id="bs">0</span></div>
    </div>
    
    <div class="weapons">
        <button class="w-btn" style="background:#ffcc00" onclick="weapon='bomb'">💣 قنبلة</button>
        <button class="w-btn" style="background:#ff5500; color:white" onclick="weapon='rocket'">🚀 صاروخ</button>
    </div>

    <div class="map">
        <script>
            for(let i=1; i<=9; i++) document.write(`<div class="zone" id="z${i}" onclick="hit(${i})">${i}</div>`);
        </script>
    </div>

    <div style="margin-top:20px">
        <button onclick="team='red'" style="background:red; color:white; padding:10px">فريق الصقور</button>
        <button onclick="team='blue'" style="background:blue; color:white; padding:10px">فريق الذئاب</button>
    </div>
</div>

<script>
    let team = ''; let weapon = ''; let pName = '';
    
    function startGame() {
        pName = document.getElementById('playerName').value;
        if(!pName) return alert("من فضلك ادخل اسمك!");
        document.getElementById('login').style.display = 'none';
        document.getElementById('gameUI').style.display = 'block';
        document.getElementById('welcomeMsg').innerText = "القائد: " + pName;
    }

    function hit(id) {
        if(!team) return alert("اختر فريقك أولاً!");
        let z = document.getElementById('z'+id);
        if(weapon == 'bomb') { z.className = 'zone'; weapon = ''; }
        else { z.className = 'zone ' + (team=='red'?'red':'blue'); weapon = ''; }
        update();
    }

    function update() {
        document.getElementById('rs').innerText = document.querySelectorAll('.red').length;
        document.getElementById('bs').innerText = document.querySelectorAll('.blue').length;
    }
</script>
</body>
</html>
