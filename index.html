<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - نسخة القبطان إيهاب</title>
    <style>
        /* التنسيق الجديد لشاشة الدخول */
        #login { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #001a00, #000); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        /* تنسيق اللوجو الخاص بالقبطان */
        .logo-img {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.7);
            margin-bottom: 20px;
            object-fit: cover; /* لضمان عدم تمدد الصورة */
        }

        .start-btn { 
            background: #ffcc00; padding: 15px 40px; border-radius: 30px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4);
        }

        /* تنسيق اللعبة الداخلي */
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .game-header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid #ffcc00; }
        .map-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 380px; margin: 20px auto; padding: 10px; }
        .zone { aspect-ratio: 1/1; background: #222; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #333; transition: 0.2s; font-size: 0.9rem;}
        .icon { font-size: 2rem; margin-bottom: 5px; }
        
        /* ألوان السيطرة */
        .red-team { background: #d00 !important; border-color: #f00; box-shadow: 0 0 15px #f00; color: white; }
        .blue-team { background: #00d !important; border-color: #00f; box-shadow: 0 0 15px #00f; color: white; }

        .btn-team { padding: 12px 25px; border: none; border-radius: 5px; margin: 5px; cursor: pointer; font-weight: bold; width: 40%; }
    </style>
</head>
<body>

<div id="login">
    <img src="https://i.ibb.co/C04Yf7D/image.jpg" class="logo-img" alt="لوجو القبطان إيهاب">
    <h1 style="color:#ffcc00; margin:0;">إيموشا: الحرب الكبرى</h1>
    <p style="color:#aaa; margin: 5px 0 20px 0;">تطوير: القبطان إيهاب أبو رتال</p>
    
    <input type="text" id="playerName" placeholder="ادخل اسم القائد للمعارك..." style="padding:15px; border-radius:10px; border:none; width:75%; text-align:center; font-size:1rem;">
    <button class="start-btn" onclick="startGame()">بدء الغزو ⚔️</button>
</div>

<div id="gameContent" style="display:none;">
    <div class="game-header">
        <h3 id="pTitle" style="color:#ffcc00; margin: 0 0 10px 0;"></h3>
        <p style="margin:0; font-size:0.9rem;">اختر فريقك وابدأ السيطرة على المنشآت الحيوية</p>
    </div>

    <div class="map-grid">
        <div class="zone" onclick="hit(this)"><span class="icon">🏭</span>مصنع</div>
        <div class="zone" onclick="hit(this)"><span class="icon">🛖</span>هنجر</div>
        <div class="zone" onclick="hit(this)"><span class="icon">🏚️</span>بيت مهجور</div>
        <div class="zone" onclick="hit(this)"><span class="icon">🏢</span>قيادة</div>
        <div class="zone" onclick="hit(this)"><span class="icon">⛽</span>محطة</div>
        <div class="zone" onclick="hit(this)"><span class="icon">🏗️</span>مخزن</div>
