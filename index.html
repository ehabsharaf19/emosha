<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا جواهر - إيهاب شرف</title>
    <style>
        body { 
            background: #000; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
        }
        
        /* شاشة الدخول */
        #login { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, #1a3300, #000); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000;
        }
        .logo-box { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 3px solid #ffcc00; 
            margin-bottom: 20px; 
            overflow: hidden; 
            box-shadow: 0 0 20px #ffcc00;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .start-btn { 
            background: #ffcc00; 
            color: #000; 
            padding: 15px 40px; 
            border: none; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 1.2rem; 
            cursor: pointer; 
        }

        /* شاشة اللعبة */
        #gameUI { 
            display: none; 
            width: 100%; 
            height: 100%; 
            flex-direction: column; 
        }
        .top-bar { 
            background: #111; 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            border-bottom: 2px solid #ffcc00; 
            font-size: 1.2rem;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 5px; 
            padding: 10px; 
            margin: auto; 
            background: #222; 
            border-radius: 10px; 
            max-width: 350px;
        }
        .gem { 
            aspect-ratio: 1/1; 
            background: #333; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem; 
            border-radius: 5px; 
            cursor: pointer;
        }
        .selected { border: 2px solid #fff; background: #555; }

        /* صندوق الأسئلة */
        #quiz { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: #333; 
            padding: 20px; 
            border: 3px solid #ffcc00; 
            border-radius: 15px; 
            display: none; 
            width: 80%; 
            z-index: 2000;
            text-align: center;
        }
        .ans-btn { 
            display: block; 
            width: 100%; 
            margin: 10px 0; 
            padding: 10px; 
            background: #444; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

<div id="login">
    <div class="logo-box">
        <img src="https://i.ibb.co/SXxQbqVh/Screenshot-Chat-GPT.jpg" alt="Logo">
    </div>
    <h2 style="color:#ffcc00">إيموشا: جواهر المعرفة</h2>
    <p>بإشراف القبطان إيهاب شرف</p>
    <button class="start-btn" onclick="startGame()">ابدأ المغامرة
