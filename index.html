<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: نظام المراحل - إيهاب شرف</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #002200 0%, #000 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-container { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #ffcc00; box-shadow: 0 0 25px rgba(255,204,0,0.4); margin-bottom: 10px; overflow: hidden; }
        .logo-img { width: 100%; height: 100%; object-fit: contain; }
        .start-btn { background: linear-gradient(45deg, #ffcc00, #ffaa00); padding: 15px 40px; border-radius: 30px; color: black; border: none; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        input { padding: 12px; border-radius: 10px; border: 1px solid #ffcc00; width: 80%; max-width: 280px; text-align: center; margin-bottom: 15px; background: rgba(255,255,255,0.1); color: white; }

        #gameUI { display: none; }
        .top-bar { background: #111; padding: 10px; border-bottom: 2px solid #ffcc00; display: flex; justify-content: space-around; align-items: center; }
        .lvl-info { color: #ffcc00; font-weight: bold; }
        .timer { color: #ff3333; border: 1px solid #ff3333; padding: 2px 10px; border-radius: 15px; }

        /* شبكة ديناميكية */
        .map-grid { display: grid; gap: 8px; max-width: 95%; margin: 15px auto; padding: 5px; justify-content: center; }
        .zone { aspect-ratio: 1/1; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.65rem; cursor: pointer; }
        .icon { font-size: 1.5rem; margin-bottom: 2px; }
        
        .red-active { background: #ff3333 !important; box-shadow: 0 0 10px #ff3333; border: none; }
        .blue-active { background: #3385ff !important; box-shadow: 0 0 10px #3385ff; border: none; }

        .footer { position: fixed; bottom: 0; width: 100%; background: #111; padding: 10px; display: flex; justify-content: center; gap: 8px; }
        .team-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div id="login">
    <div class="logo-container"><img src="https://i.ibb.co/SXxQbqVh/Screenshot-Chat-GPT.jpg" class="logo-img"></div>
    <h3 style="color:#ffcc00; margin:5px;">إيموشا: صراع المراحل</h3>
    <p style="color:#aaa; font-size:0.85rem; margin-bottom: 15px;">المطور: القبطان إيهاب شرف</p>
    <input type="email" id="uE" placeholder="سجل دخولك يا بطل...">
    <button class="start-btn" onclick="initGame()">دخول المرحلة الأولى ⚔️</button>
</div>

<div id="gameUI">
    <div class="top-bar">
        <div class="lvl-info" id="lvlText">المرحلة: 1</div>
        <div class="timer">⏳ <span id="tm">60</span>s</div>
        <div style="color:#ffcc00">💰 <span id="gd">0</span></div>
    </div>

    <div class="map-grid" id="grid"></div>

    <div class="footer">
        <button class="team-btn" style="background:#ff3333;" onclick="team='red-active'">فريق الصقور</button>
        <button class="team-btn" style="background:#3385ff;" onclick="team='blue-active'">فريق الذئاب</button>
    </div>
</div>

<script>
    let team = '', gold = 0, time = 60, level = 1, gameOn = false;
    const icons = ['🏭','🛖','🏚️','🏢','⛽','🏗️','🏘️','🏠','🚧','🚁','⚓','📡','🧪','🔥','💎','🛰️'];

    function initGame() {
        let e = document.getElementById('uE').value;
        if(!e || !e.includes('@')) return alert("الرجاء إدخال الإيميل!");
        document.getElementById('login').style.display = 'none';
        document.getElementById('gameUI').style.display = 'block';
        loadLevel(1);
        startTimer();
    }

    function loadLevel(lv) {
        level = lv;
        document.getElementById('lvlText').innerText = "المرحلة: " + level;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        // تغيير حجم الشبكة بناء على المرحلة
        let count = (lv === 1) ? 9 : 16;
        grid.style.gridTemplateColumns = `repeat(${(lv === 1) ? 3 : 4}, 1fr)`;
        
        for(let i=0; i<count; i++) {
            let div = document.createElement('div');
            div.className = 'zone';
            div.onclick = function() { capture(this); };
            div.innerHTML = `<span class="icon">${icons[i]}</span>`;
            grid.appendChild(div);
        }
        gameOn = true;
    }

    function capture(el) {
        if(!gameOn || !team) return;
        if(!el.classList.contains(team)) {
            el.className = 'zone ' + team;
            gold += (level * 50); 
            document.getElementById('gd').innerText = gold;
            checkLevelProgress();
        }
    }

    function checkLevelProgress() {
        let captured = document.querySelectorAll('.' + team).length;
        let total = (level === 1) ? 9 : 16;
        
        if(captured === total && level < 3) {
            gameOn = false;
            alert("مبروك! خلصت المرحلة " + level + ". استعد للي بعدها!");
            loadLevel(level + 1);
        }
    }

    function startTimer() {
        setInterval(() => {
            if(time > 0) { time--; document.getElementById('tm').innerText = time; }
            else if(gameOn) { gameOn = false; alert("انتهى الوقت! رصيدك: " + gold); location.reload(); }
        }, 1000);
    }
</script>
</body>
</html>
