<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - إيهاب شرف</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; overflow-x: hidden; }
        
        /* شاشة الدخول الفخمة */
        #login { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #003300 0%, #000000 100%); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .logo-container {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
            margin-bottom: 20px;
            overflow: hidden;
            background: #111;
        }

        .logo-img { width: 100%; height: 100%; object-fit: contain; }

        .dev-name { color: #aaa; font-size: 1.1rem; margin-bottom: 30px; letter-spacing: 1px; }

        input { 
            padding: 15px; border-radius: 12px; border: none; width: 80%; max-width: 300px; 
            text-align: center; font-size: 1rem; margin-bottom: 20px; outline: none;
        }

        .start-btn { 
            background: linear-gradient(45deg, #ffcc00, #ffaa00); 
            padding: 15px 60px; border-radius: 35px; color: black;
            border: none; font-weight: bold; cursor: pointer; font-size: 1.3rem;
            box-shadow: 0 8px 20px rgba(255, 204, 0, 0.3); transition: 0.3s;
        }

        /* الميدان */
        .game-header { background: #111; padding: 20px; border-bottom: 3px solid #ffcc00; position: sticky; top: 0; z-index: 10; }
        .map-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 400px; margin: 30px auto; padding: 15px; }
        .zone { aspect-ratio: 1/1; background: #222; border-radius: 15px; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; transition: 0.3s; cursor: pointer; }
        
        .red-active { background: #ff3333 !important; border-color: #ff6666; box-shadow: 0 0 15px #ff3333; }
        .blue-active { background: #3385ff !important; border-color: #66a3ff; box-shadow: 0 0 15px #3385ff; }

        .footer-tools { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: center; gap: 10px; border-top: 1px solid #333; }
        .team-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div id="login">
    <div class="logo-container">
        <img src="https://i.ibb.co/SXxQbqVh/Screenshot-Chat-GPT.jpg" class="logo-img" alt="إيموشا">
    </div>
    <h1 style="color:#ffcc00; font-size: 2.2rem; margin: 0;">إيموشا: الحرب</h1>
    <p class="dev-name">تطوير: إيهاب شرف</p>
    
    <input type="text" id="userName" placeholder="اكتب اسم القائد هنا...">
    <button class="start-btn" onclick="start()">دخول الميدان ⚔️</button>
</div>

<div id="gameUI" style="display:none;">
    <div class="game-header">
        <h2 id="displayTitle" style="margin:0; color:#ffcc00;"></h2>
    </div>

    <div class="map-grid">
        <div class="zone" onclick="capture(this)">1</div>
        <div class="zone" onclick="capture(this)">2</div>
        <div class="zone" onclick="capture(this)">3</div>
        <div class="zone" onclick="capture(this)">4</div>
        <div class="zone" onclick="capture(this)">5</div>
        <div class="zone" onclick="capture(this)">6</div>
        <div class="zone" onclick="capture(this)">7</div>
        <div class="zone" onclick="capture(this)">8</div>
        <div class="zone" onclick="capture(this)">9</div>
    </div>

    <div class="footer-tools">
        <button class="team-btn" style="background:#ff3333;" onclick="currentTeam='red-active'">فريق الصقور</button>
        <button class="team-btn" style="background:#3385ff;" onclick="currentTeam='blue-active'">فريق الذئاب</button>
    </div>
</div>

<script>
    let currentTeam = '';

    function start() {
        let n = document.getElementById('userName').value;
        if(!n) return alert("من فضلك ادخل اسمك يا قائد");
        document.getElementById('login').style.display = 'none';
        document.getElementById('gameUI').style.display = 'block';
        document.getElementById('displayTitle').innerText = "القائد الميداني: " + n;
    }

    function capture(el) {
        if(!currentTeam) return alert("اختر فريقك أولاً من الأسفل!");
        el.className = 'zone ' + currentTeam;
    }
</script>

</body>
</html>
