<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - صائد الجواهر</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; text-align: center; overflow: hidden; margin: 0; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a2e, #16213e); }
        .gem { position: absolute; font-size: 40px; cursor: pointer; transition: transform 0.2s; z-index: 10; }
        .gem:hover { transform: scale(1.3); }
        #ui { position: fixed; top: 20px; left: 20px; font-size: 24px; color: #ffd700; z-index: 100; text-shadow: 0 0 10px gold; }
        #quiz-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; justify-content: center; align-items: center; flex-direction: column; }
        .quiz-box { background: #1e1e2e; padding: 30px; border-radius: 20px; border: 3px solid #ffd700; max-width: 80%; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 15px; border: none; border-radius: 10px; background: #0f3460; color: white; cursor: pointer; font-size: 18px; }
        .option-btn:hover { background: #ffd700; color: black; }
        #msg { color: #00ff00; font-weight: bold; }
    </style>
</head>
