<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - خريطة الغزو</title>
    <style>
        body { background: #0f140f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .map-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            max-width: 400px; 
            margin: 20px auto; 
            padding: 20px;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* خلفية توحي بالأرض */
            border: 3px solid #333;
            border-radius: 15px;
        }
        .location { 
            aspect-ratio: 1/1; 
            background: #2a2a2a; 
            border: 2px solid #444; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }
        .icon { font-size: 2rem; margin-bottom: 5px; }
        .red-captured { background: #990000 !important; border-color: #ff3333; box-shadow: 0 0 15px #ff3333; color: white; }
        .blue-captured { background: #0044cc !important; border-color: #3385ff; box-shadow: 0 0 15px #3385ff; color: white; }
        .info-bar { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-bottom: 2px solid #ffcc00; }
        .btn-team { padding: 10px 20px; border: none; border-radius: 5px; margin: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" type="audio/mpeg">
</audio>

<div class="info-bar">
    <h2 id="pDisplay">خريطة العمليات</h2>
    <div style="display:flex; justify-content: space-around;">
        <span>🔴 الصقور: <b id="rcount">0</b></span>
        <span>🔵 الذئاب: <b id="bcount">0</b></span>
    </div>
</div>

<div class="map-grid">
    <div class="location" id="loc1" onclick="capture(1)"><span class="icon">🏭</span>مصنع كيماوي</div>
    <div class="location" id="loc2" onclick="capture(2)"><span class="icon">🏚️</span>بيت مهجور</div>
    <div class="location" id="loc3" onclick="capture(3)"><span class="icon">🛖</span>هنجر سلاح</div>
    <div class="location" id="loc4" onclick="capture(4)"><span class="icon">🏠</span>منطقة سكنية</div>
    <div class="location" id="loc5" onclick="capture(5)"><span class="icon">🏢</span>مركز قيادة</div>
    <div class="location" id="loc6" onclick="capture(6)"><span class="icon">🏗️</span>موقع بناء</div>
    <div class="location" id="loc7" onclick="capture(7)"><span class="icon">⛽</span>محطة وقود</div>
    <div class="location" id="loc8" onclick="capture(8)"><span class="icon">Warehouse</span>مخزن أغذية</div>
    <div class="location" id="loc9" onclick="capture(9)"><span class="icon">🏘️</span>قرية حدودية</div>
</div>

<div style="margin-top:20px;">
    <button class="btn-team" style="background:#ff3333; color:white;" onclick="currentTeam='red'">الالتحاق بالصقور</button>
    <button class="btn-team" style="background:#3385ff; color:white;" onclick="currentTeam='blue'">الالتحاق بالذئاب</button>
</div>

<button onclick="document.getElementById('bgMusic').play()" style="margin-top:20px; background:none; border:1px solid #555; color:#888; border-radius:20px; padding:5px 15px;">تشغيل الصوت 🔊</button>

<script>
    let currentTeam = '';
    function capture(id) {
        if(!currentTeam) return alert("يجب اختيار فريقك أولاً لبدء الغزو!");
        let loc = document.getElementById('loc'+id);
        loc.className = 'location ' + (currentTeam === 'red' ? 'red-captured' : 'blue-captured');
        document.getElementById('rcount').innerText = document.querySelectorAll('.red-captured').length;
        document.getElementById('bcount').innerText = document.querySelectorAll('.blue-captured').length;
    }
</script>

</body>
</html>
