<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا جواهر - إيهاب شرف</title>
    <style>
        /* التنسيق الأساسي لمنع الشاشة السوداء */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; color: white; 
            font-family: sans-serif; overflow: hidden; 
        }
        
        /* شاشة الدخول الاحترافية */
        #main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: radial-gradient(circle, #002200 0%, #000 100%);
        }
        .logo-circle {
            width: 150px; height: 150px; border-radius: 50%;
            border: 4px solid #ffcc00; margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
            background: #111; overflow: hidden;
        }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        h1 { color: #ffcc00; margin: 10px 0; font-size: 1.8rem; }
        p { color: #aaa; margin-bottom: 30px; }

        .play-btn {
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            color: black; border: none; padding: 15px 50px;
            border-radius: 30px; font-weight: bold; font-size: 1.2rem;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* واجهة اللعبة */
        #game-ui { display: none; flex-direction: column; width: 100%; height: 100%; }
        .stats-bar { 
            padding: 15px; background: #111; border-bottom: 2px solid #ffcc00;
            display: flex; justify-content: space-around; font-size: 1.2rem;
        }
        .grid-box { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .grid { 
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
            width: 100%; max-width: 360px; background: #222; padding: 10px; border-radius: 10px;
        }
        .item { 
            aspect-ratio: 1/1; background: #333; border-radius: 5px;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="logo-circle">
