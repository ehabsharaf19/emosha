<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Emousha Gems PRO</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:Tahoma;
overflow:hidden;
color:white;
}

#particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:radial-gradient(circle at top,#0f172a,#000);
}

.topbar{
width:100%;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.7);
border-bottom:2px solid #FFD700;
position:fixed;
top:0;
z-index:10;
}

.logo{
font-size:28px;
font-weight:bold;
color:#FFD700;
text-shadow:0 0 15px #FFD700;
}

.stats{
display:flex;
gap:20px;
font-size:20px;
}

.stats span{
color:#FFD700;
}

.game-container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding-top:90px;
}

.board{
display:grid;
grid-template-columns:repeat(8,70px);
grid-template-rows:repeat(8,70px);
gap:5px;
background:#111;
padding:15px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,215,0,.3);
}

.gem{
width:70px;
height:70px;
border-radius:18px;
display:flex;
justify-content:center;
align-items:center;
font-size:38px;
cursor:pointer;
transition:.2s;
user-select:none;
background:#1f1f1f;
}

.gem:hover{
transform:scale(1.08);
}

.selected{
outline:4px solid #FFD700;
transform:scale(1.1);
}

.explode{
animation:explode .3s linear;
}

@keyframes explode{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(0);opacity:0;}
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:30px;
border-radius:20px;
border:2px solid #FFD700;
display:none;
text-align:center;
width:90%;
max-width:400px;
z-index:20;
}

.popup h2{
margin-bottom:20px;
color:#FFD700;
}

.popup button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:#FFD700;
color:black;
font-size:18px;
cursor:pointer;
}

.shop-btn,
.spin-btn{
position:fixed;
bottom:20px;
padding:15px 20px;
border:none;
border-radius:15px;
background:#FFD700;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.shop-btn{
right:20px;
}

.spin-btn{
left:20px;
}

@media(max-width:700px){

.board{
grid-template-columns:repeat(8,40px);
grid-template-rows:repeat(8,40px);
}

.gem{
width:40px;
height:40px;
font-size:22px;
}

.logo{
font-size:20px;
}

.stats{
font-size:16px;
}

}

</style></head><body><canvas id="particles"></canvas>

<div class="topbar">
<div class="logo">💎 EMOUSHA GEMS</div><div class="stats">
<div>💰 <span id="gold">0</span></div>
<div>⭐ <span id="score">0</span></div>
<div>❤️ <span id="lives">5</span></div>
</div>
</div><div class="game-container">
<div class="board" id="board"></div>
</div><div class="popup" id="questionPopup">
<h2>🧠 سؤال سريع</h2>
<p id="questionText"></p>
<div id="answers"></div>
</div><button class="shop-btn" onclick="openShop()">🛒 المتجر</button> <button class="spin-btn" onclick="spinWheel()">🎡 عجلة الحظ</button>

<audio id="matchSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio> <audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-game-level-music-689.mp3" loop></audio>

<script>

const gems=["💎","⭐","🔱","🛡️","💣","🧿"];
const board=document.getElementById('board');
const size=8;
let grid=[];
let selected=null;
let score=0;
let gold=0;
let lives=5;

const questions=[
{
q:"ما عاصمة مصر؟",
a:["القاهرة","روما","باريس"],
correct:"القاهرة"
},
{
q:"كم عدد الكواكب؟",
a:["8","9","7"],
correct:"8"
},
{
q:"أكبر محيط؟",
a:["الهادئ","الهندي","الأطلسي"],
correct:"الهادئ"
}
];

function updateUI(){

document.getElementById('score').innerText=score;
document.getElementById('gold').innerText=gold;
document.getElementById('lives').innerText=lives;

localStorage.setItem('emousha_score',score);
localStorage.setItem('emousha_gold',gold);

}

function randomGem(){
return gems[Math.floor(Math.random()*gems.length)];
}

function createBoard(){

board.innerHTML='';
grid=[];

for(let row=0;row<size;row++){

let current=[];

for(let col=0;col<size;col++){

const gem=document.createElement('div');

gem.classList.add('gem');

gem.innerText=randomGem();

gem.dataset.row=row;
gem.dataset.col=col;

addDragEvents(gem);

board.appendChild(gem);
current.push(gem);

}

grid.push(current);

}

checkMatches();

}

function addDragEvents(gem){

gem.draggable=true;

gem.addEventListener('dragstart',()=>{
selected=gem;
});

gem.addEventListener('dragover',(e)=>{
e.preventDefault();
});

gem.addEventListener('drop',()=>{

if(!selected || selected===gem) return;

swapGems(selected,gem);

});

}

function swapGems(a,b){

const temp=a.innerText;
a.innerText=b.innerText;
b.innerText=temp;

setTimeout(()=>{
checkMatches();
},150);

}

function checkMatches(){

let matched=false;

for(let row=0;row<size;row++){
for(let col=0;col<size-2;col++){

let g1=grid[row][col];
let g2=grid[row][col+1];
let g3=grid[row][col+2];

if(
g1.innerText===g2.innerText &&
g2.innerText===g3.innerText
){

explodeGem(g1);
explodeGem(g2);
explodeGem(g3);

matched=true;

score+=30;
gold+=10;

}

}
}

for(let col=0;col<size;col++){
for(let row=0;row<size-2;row++){

let g1=grid[row][col];
let g2=grid[row+1][col];
let g3=grid[row+2][col];

if(
g1.innerText===g2.innerText &&
g2.innerText===g3.innerText
){

explodeGem(g1);
explodeGem(g2);
explodeGem(g3);

matched=true;

score+=30;
gold+=10;

}

}
}

if(matched){

playMatchSound();
updateUI();

if(score % 300===0){
showQuestion();
}

}

}

function explodeGem(gem){

gem.classList.add('explode');

setTimeout(()=>{

gem.classList.remove('explode');
gem.innerText=randomGem();

},300);

}

function playMatchSound(){

const s=document.getElementById('matchSound');
s.currentTime=0;
s.play();

}

function startMusic(){

document.getElementById('bgMusic').play();

}

function showQuestion(){

const popup=document.getElementById('questionPopup');
const q=questions[Math.floor(Math.random()*questions.length)];

popup.style.display='block';

document.getElementById('questionText').innerText=q.q;

const answers=document.getElementById('answers');
answers.innerHTML='';

q.a.forEach(ans=>{

const btn=document.createElement('button');
btn.innerText=ans;

btn.onclick=()=>{

if(ans===q.correct){

gold+=100;
score+=100;
alert('✅ إجابة صحيحة');

}else{

lives--;
alert('❌ إجابة خاطئة');

}

updateUI();
popup.style.display='none';

};

answers.appendChild(btn);

});

}

function spinWheel(){

const rewards=[
'+100 ذهب',
'+300 نقاط',
'جوهرة نادرة',
'+1 حياة'
];

const reward=rewards[
Math.floor(Math.random()*rewards.length)
];

if(reward.includes('ذهب')) gold+=100;
if(reward.includes('نقاط')) score+=300;
if(reward.includes('حياة')) lives++;

updateUI();

alert('🎉 ربحت: '+reward);

}

function openShop(){

if(gold>=100){

gold-=100;
score+=200;

alert('🛒 تم شراء Boost');

}else{

alert('❌ ذهب غير كافي');

}

updateUI();

}

function dailyReward(){

const last=localStorage.getItem('dailyReward');
const now=Date.now();

if(!last || now-last>86400000){

gold+=200;

localStorage.setItem('dailyReward',now);

alert('🎁 مكافأة يومية +200 ذهب');

updateUI();

}

}

function loadSave(){

score=parseInt(localStorage.getItem('emousha_score'))||0;
gold=parseInt(localStorage.getItem('emousha_gold'))||0;

updateUI();

}

loadSave();
createBoard();
dailyReward();

window.addEventListener('click',startMusic,{once:true});

const canvas=document.getElementById('particles');
const ctx=canvas.getContext('2d');

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
d:Math.random()*2
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle='rgba(255,215,0,.6)';

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();

p.y+=p.d;

if(p.y>canvas.height){
p.y=0;
}

});

requestAnimationFrame(animate);

}

animate();

</script></body>
</html>
