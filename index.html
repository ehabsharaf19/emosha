<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: جواهر المعرفة</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root { --gold: #ffd700; --bg: #0a192f; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        .header { background: #112240; padding: 15px; border-bottom: 3px solid var(--gold); }
        
        /* تصميم لوحة الجواهر */
        #grid { 
            display: grid; grid-template-columns: repeat(8, 40px); grid-gap: 5px; 
            justify-content: center; margin: 20px auto; padding: 10px; 
            background: #1d2d50; border-radius: 10px; width: fit-content;
        }
        .gem { 
            width: 40px; height: 40px; border-radius: 8px; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            transition: transform 0.1s;
        }
        .selected { border: 2px solid white; transform: scale(1.1); box-shadow: 0 0 10px white; }

        /* شاشة السؤال (بوابة العبور) */
        #quiz-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .quiz-card { background: #112240; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); width: 85%; max-width: 350px; }
        .opt { background: var(--gold); color: black; border: none; padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>Emousha Gems 💎</h2>
    <div style="display: flex; justify-content: space-around; font-weight: bold;">
        <span>المرحلة: <span id="lvl">1</span></span>
        <span>الذهب: <span id="scr">0</span></span>
        <span>الهدف: <span id="tgt">200</span></span>
    </div>
</div>

<div id="grid"></div>

<div id="quiz-overlay">
    <div class="quiz-card">
        <h3 style="color: var(--gold)">بوابة العبور الذكية</h3>
        <p id="q-text">السؤال يظهر هنا...</p>
        <div id="options"></div>
    </div>
</div>

<script>
    const colors = ['🍎', '🍏', '💎', '⭐', '🧿', '🍇'];
    let score = 0;
    let level = 1;
    let target = 200;
    let firstClick = null;
    let board = [];

    // بنك الأسئلة للمراحل
    const quizBank = [
        { q: "ما هي عاصمة مصر؟", a: ["القاهرة", "الإسكندرية", "أسوان"], c: 0 },
        { q: "ما هو أسرع حيوان بري؟", a: ["الأسد", "الفهد", "الغزال"], c: 1 },
        { q: "كم عدد ألوان قوس قزح؟", a: ["5", "6", "7"], c: 2 }
    ];

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        board = [];
        for (let i = 0; i < 64; i++) {
            const gem = document.createElement('div');
            gem.className = 'gem';
            const color = colors[Math.floor(Math.random() * colors.length)];
            gem.innerText = color;
            gem.dataset.id = i;
            gem.onclick = () => handleItemClick(gem);
            grid.appendChild(gem);
            board.push(gem);
        }
    }

    function handleItemClick(gem) {
        if (!firstClick) {
            firstClick = gem;
            gem.classList.add('selected');
        } else {
            // منطق التبديل
            let temp = firstClick.innerText;
            firstClick.innerText = gem.innerText;
            gem.innerText = temp;
            
            firstClick.classList.remove('selected');
            firstClick = null;
            
            // زيادة النقاط عند التبديل (للتجربة حالياً)
            score += 20;
            document.getElementById('scr').innerText = score;
            if (score >= target) showQuiz();
        }
    }

    function showQuiz() {
        const overlay = document.getElementById('quiz-overlay');
        const qData = quizBank[(level - 1) % quizBank.length];
        document.getElementById('q-text').innerText = qData.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        
        qData.a.forEach((ans, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.innerText = ans;
            btn.onclick = () => {
                if (idx === qData.c) {
                    overlay.style.display = 'none';
                    levelUp();
                } else {
                    alert("إجابة خاطئة! ركز يا قبطان.");
                }
            };
            optDiv.appendChild(btn);
        });
        overlay.style.display = 'flex';
    }

    function levelUp() {
        level++;
        score = 0;
        target += 100;
        document.getElementById('lvl').innerText = level;
        document.getElementById('scr').innerText = score;
        document.getElementById('tgt').innerText = target;
        initGame();
        alert("مبروك! أنت الآن في المرحلة " + level);
    }

    window.onload = initGame;
</script>

</body>
</html>
