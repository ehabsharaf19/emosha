<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا جواهر - إيهاب شرف</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0b0b0b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow: hidden; touch-action: none; text-align: center; }
        
        /* شاشة الدخول */
        #login { position: fixed; inset: 0; background: radial-gradient(circle, #002200, #000); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-box { width: 140px; height: 140px; border-radius: 50%; border: 3px solid var(--gold); box-shadow: 0 0 20px var(--gold); margin-bottom: 15px; overflow: hidden; background: #111; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        .btn-start { background: linear-gradient(45deg, var(--gold), #ffaa00); padding: 15px 45px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(255,204,0,0.3); }

        /* شاشة اللعبة */
        #gameUI { display: none; height: 100vh; display: flex; flex-direction: column; }
        .top-bar { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-around; font-weight: bold; font-size: 1.1rem; }
        
        .grid-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; background: #1a1a1a; padding: 10px; border-radius: 12px; border: 2px solid #333; max-width: 380px; width: 100%; }
        .gem { aspect-ratio: 1/1; background: #2a2a2a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; cursor: pointer; transition: transform 0.2s, background 0.3s; }
        .gem:active { transform: scale(0.9); }
        .selected { border: 2px solid white; box-shadow: 0 0 15px white; z-index: 5; }

        /* صندوق الأسئلة */
        #quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 200; }
        .quiz-card { background: #222; width: 85%; padding: 25px; border-radius: 20px; border: 3px solid var(--gold); }
        .ans-btn { background: #333; color: white; border: 1px solid #555; padding: 12px; margin: 8px 0; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .ans-btn:hover { background: var(--gold); color: black; }

        .footer-info { padding: 10px; color: #888; font-size: 0.8rem; }
    </style>
</head>
