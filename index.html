<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا: قبطان الجواهر</title>
    <style>
        :root { --blue: #0072ff; --gold: #ffd700; }
        body { background: #000428; color: white; font-family: sans-serif; margin: 0; text-align: center; overflow: hidden; touch-action: none; }
        .header { background: linear-gradient(180deg, #0072ff, #00c6ff); padding: 15px; border-bottom: 4px solid var(--gold); }
        .stats { display: flex; justify-content: center; gap: 20px; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }
        #grid { display: grid; grid-template-columns: repeat(8, 42px); grid-gap: 5px; justify-content: center; margin: 20px auto; background: rgba(0,242,255,0.1); padding: 10px; border-radius: 12px; border: 2px solid #00f2ff; width: fit-content; }
        .cell { width: 42px; height: 42px; background: #1a2a4a; display: flex; align-items: center; justify-content: center; font-size: 24px; border-radius: 8px; cursor: pointer; user-select: none; transition: transform 0.1s; }
        .active { outline: 3px solid white; transform: scale(1.1); z-index: 5; }
        .quiz-box { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #001a33; padding: 25px; border: 3px solid var(--gold); border-radius: 20px; z-index: 100; width: 85%; box-shadow: 0 0 40px #000; }
        .ans-btn { background: var(--gold); color: black; border: none; padding: 12px; margin: 8px 0; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size: 1.4rem;">💎 إيموشا: جواهر المعرفة</h1>
    <div class="stats">
