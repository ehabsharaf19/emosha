<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إيموشا - القبطان إيهاب</title>
    <style>
        #login { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #002200, #000); 
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .logo-img {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid #ffcc00;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.6);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .start-btn { 
            background: linear-gradient(45deg, #ffcc00, #ffaa00); 
            padding: 15px 50px; border-radius: 30px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem;
            color: black; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4);
        }

        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        .game-header { background: #151515; padding: 20px; border-bottom: 2px solid #ffcc00; }
        .map-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 380px; margin: 25px auto; padding: 10px; }
        .zone { aspect-ratio: 1/1; background: #252525; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .icon { font-size: 1.8rem; margin-bottom: 3px; }
        
        .red-team { background: #e60000 !important; box-shadow: 0 0 15px #ff0000; color: white; border: none; }
        .blue-team { background: #0066ff !important; box-shadow: 0 0 15px #0088ff; color: white; border: none; }
        
        .controls { position: sticky; bottom: 0; background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: center; gap: 10px; }
        .btn-t { padding: 12px; border-radius: 8px; border: none; font-weight: bold; flex: 1; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <img src="https://i.ibb.co/99vw6RyF/Screenshot-Chat-GPT.jpg" class="logo-img" alt="Logo">
    <h1 style="color:#ffcc00; margin:10px 0 5px 0;">إيموشا: Emosha</h1>
    <p style="color:#ddd; margin-bottom: 25px;">بإشراف القائد: إيهاب أبو رتال</p>
    
    <input type="text" id="pName" placeholder="اسم المقاتل..." style="padding:15px; border-radius:10px; border:none; width:70%; margin-bottom:20px; text-align:center;">
    <button class="start-btn" onclick="go()">دخول الميدان ⚔️</button>
</div>

<div id="gameUI" style="display:none;">
    <div class="game-header">
        <h2 id="pDisplay" style="color:#ffcc00; margin:0;"></h2>
    </div>

    <div class="map-grid">
        <div class="zone" onclick="take(this)"><span class="icon">🏭</span>مصنع</div>
        <div class="zone" onclick="take(this)"><span class="icon">🛖</span>هنجر</div>
        <div class="zone" onclick="take(this)"><span class="icon">🏚️</span>بيت</div>
        <div class="zone" onclick="take(this)"><span class="icon">🏢</span>قيادة</div>
        <div class="zone" onclick="take(this)"><span class="icon">⛽</span>محطة</div>
        <div class="zone" onclick="take(this)"><span class="icon">🏗️</span>مخزن</div>
        <div class="zone" onclick="take(this)"><span class="icon">🏘️</span>قرية</div>
        <div class="zone" onclick="take(this)"><span class="icon">🏠</span>فيلا</div>
        <div class="zone" onclick="take(this)"><span class="icon">🚧</span>حاجز</div>
    </div>

    <div class="controls">
        <button class="btn-t" style="background:#ff3333; color:white;" onclick="tm='red-team'">فريق الصقور</button>
        <button class="btn-t" style="background:#3385ff; color:white;" onclick="tm='blue-team'">فريق الذئاب</button>
    </div>
</div>

<script>
    let tm = '';
    function go() {
        let n = document.getElementById('pName').value;
        if(!n) return alert("الرجاء إدخال الاسم!");
        document.getElementById('login').style.display = 'none';
        document.getElementById('gameUI').style.display = 'block';
        document.getElementById('pDisplay').innerText = "القائد: " + n;
    }
    function take(el) {
        if(!tm) return alert("اختر فريقك أولاً!");
        el.className = 'zone ' + tm;
    }
</script>
</body>
</html>
