<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMOSHA | جواهر المعرفة</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #061106, #0d1f0d);
            font-family: Arial;
            color: white;
            overflow-x: hidden;
            text-align: center;
        }

        h1 {
            color: gold;
            margin-top: 10px;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid gold;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .info-box {
            font-size: 18px;
            font-weight: bold;
        }

        #board {
            width: 390px;
            margin: 20px auto;
            display: grid;
            grid-template-columns: repeat(6, 60px);
            gap: 5px;
        }

        .cell {
            width: 60px;
            height: 60px;
            background: #1c1c1c;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
            border: 2px solid #333;
        }

        .cell:hover {
            transform: scale(1.06);
            border-color: gold;
        }

        .cell.active {
            background: #305430;
            transform: scale(0.95);
        }

        .question-box {
            width: 92%;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }

        .question-box h2 {
            margin-bottom: 20px;
            color: gold;
            line-height: 1.7;
        }

        .answer-btn {
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border: none;
            border-radius: 14px;
            background: gold;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .answer-btn:hover {
            background: orange;
        }

        .start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #061106, #000);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-screen h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .start-screen p {
            margin-bottom: 20px;
            color: #ccc;
        }

        .start-btn {
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            background: gold;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
        }

        .message {
            margin-top: 20px;
            font-size: 24px;
            color: gold;
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- شاشة البداية -->
    <div class="start-screen" id="startScreen">

        <h1>EMOSHA 💎</h1>

        <p>جواهر المعرفة - النسخة الاحترافية</p>

        <button class="start-btn" onclick="startGame()">
            ابدأ اللعب
        </button>

    </div>

    <!-- الشريط العلوي -->
    <div class="top-bar">

        <div class="info-box">
            💰 الذهب:
            <span id="score">0</span>
        </div>

        <div class="info-box">
            🏆 المرحلة:
            <span id="level">1</span>
        </div>

        <div class="info-box">
            👆 الضغطات:
            <span id="moves">0</span> / 20
        </div>

    </div>

    <!-- لوحة اللعبة -->
    <div id="board"></div>

    <!-- صندوق الأسئلة -->
    <div class="question-box" id="questionBox">

        <h2 id="questionText"></h2>

        <div id="answers"></div>

    </div>

    <!-- رسالة الفوز -->
    <div class="message" id="finishMessage">

        🎉 لقد أنهيت جميع المراحل 🎉

    </div>

    <!-- موسيقى هادئة -->
    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8e4c3d5.mp3?filename=relaxing-145038.mp3" type="audio/mp3">
    </audio>

    <script type="module">

        // =========================
        // FIREBASE
        // =========================

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import { getAnalytics }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBORppTYoq6wbsoM8cED7T_cW5UHVX5XbE",
            authDomain: "emosha-b67a3.firebaseapp.com",
            projectId: "emosha-b67a3",
            storageBucket: "emosha-b67a3.firebasestorage.app",
            messagingSenderId: "136317351287",
            appId: "1:136317351287:web:f9b7186384278ba6c21d72",
            measurementId: "G-G4F8CDJV0L"
        };

        const app = initializeApp(firebaseConfig);

        const analytics = getAnalytics(app);

        console.log("Firebase Connected ✅");


        // =========================
        // بيانات اللعبة
        // =========================

        const board = document.getElementById("board");

        const items = [
            "💎",
            "🧿",
            "⭐",
            "🍭",
            "🍬",
            "🔱"
        ];

        let score = 0;

        let level = 1;

        let moves = 0;

        let maxMoves = 20;


        // =========================
        // أسئلة صعبة نسبياً
        // =========================

        const questions = [

            {
                q: "ما الدولة التي تمتلك أكبر عدد من الجزر في العالم؟",
                options: [
                    "السويد",
                    "إندونيسيا",
                    "اليابان",
                    "النرويج"
                ],
                answer: "السويد"
            },

            {
                q: "ما أسرع كائن بحري في العالم؟",
                options: [
                    "القرش",
                    "سمكة أبو شراع",
                    "الحوت الأزرق",
                    "التونة"
                ],
                answer: "سمكة أبو شراع"
            },

            {
                q: "كم يبلغ عدد عظام جسم الإنسان البالغ؟",
                options: [
                    "206",
                    "201",
                    "212",
                    "198"
                ],
                answer: "206"
            },

            {
                q: "من هو مكتشف قانون الجاذبية؟",
                options: [
                    "نيوتن",
                    "أينشتاين",
                    "أرخميدس",
                    "غاليلو"
                ],
                answer: "نيوتن"
            },

            {
                q: "ما هي أعمق نقطة في محيطات العالم؟",
                options: [
                    "خندق ماريانا",
                    "البحر الأحمر",
                    "المحيط المتجمد",
                    "خليج المكسيك"
                ],
                answer: "خندق ماريانا"
            }

        ];


        // تكرار الأسئلة حتى 100 مرحلة

        while (questions.length < 100) {

            questions.push(...questions);

        }


        // =========================
        // تشغيل اللعبة
        // =========================

        window.startGame = function () {

            document.getElementById("startScreen").style.display = "none";

            document.getElementById("bgMusic").volume = 0.2;

            document.getElementById("bgMusic").play();

            createBoard();

        }


        // =========================
        // إنشاء اللوحة
        // =========================

        function createBoard() {

            board.innerHTML = "";

            for (let i = 0; i < 36; i++) {

                let cell = document.createElement("div");

                cell.className = "cell";

                cell.innerHTML =
                    items[Math.floor(Math.random() * items.length)];

                cell.onclick = () => clickItem(cell);

                board.appendChild(cell);
            }
        }


        // =========================
        // الضغط على العناصر
        // =========================

        function clickItem(cell) {

            cell.classList.add("active");

            setTimeout(() => {
                cell.classList.remove("active");
            }, 150);

            score += 5;

            moves++;

            document.getElementById("score").innerText = score;

            document.getElementById("moves").innerText = moves;

            // انتهاء المرحلة بعد عدد الضغطات فقط

            if (moves >= maxMoves) {

                showQuestion();
            }
        }


        // =========================
        // عرض السؤال
        // =========================

        function showQuestion() {

            document.getElementById("questionBox").style.display = "block";

            const qData = questions[level - 1];

            document.getElementById("questionText").innerText = qData.q;

            const answersDiv = document.getElementById("answers");

            answersDiv.innerHTML = "";

            qData.options.forEach(option => {

                const btn = document.createElement("button");

                btn.className = "answer-btn";

                btn.innerText = option;

                btn.onclick = () => checkAnswer(option);

                answersDiv.appendChild(btn);

            });
        }


        // =========================
        // فحص الإجابة
        // =========================

        function checkAnswer(answer) {

            const qData = questions[level - 1];

            if (answer === qData.answer) {

                score += 100;

                level++;

                moves = 0;

                document.getElementById("score").innerText = score;

                document.getElementById("level").innerText = level;

                document.getElementById("moves").innerText = moves;

                document.getElementById("questionBox").style.display = "none";

                maxMoves++;

                createBoard();

                if (level > 100) {

                    board.innerHTML = "";

                    document.getElementById("finishMessage").style.display = "block";
                }

            } else {

                alert("إجابة خاطئة ❌ حاول مرة أخرى");

            }
        }

    </script>

</body>

</html>
